bio: |
Dr. Zhang Aitao is a lecturer at the School of Medical Imaging, Hebei Medical University, where he teaches Medical Artificial Intelligence, MATLAB, and Medical Image Processing to undergraduate students. He holds a BEng in Biomedical Engineering from Southern Medical University (2011) and is currently pursuing a PhD in Biomedical Engineering at Beijing Institute of Technology. His research focuses on medical signal and image processing.In teaching, he has led or participated in six provincial educational reform initiatives and co-authored the textbook Python Machine Learning: Techniques and Applications. He has also mentored students to win 2 national and over 10 provincial awards in innovation and computer design competitions.


